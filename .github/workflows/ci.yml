name: CI Pipeline

on:
  push:
    branches:
      - main
      - section-2-testing
      - section-3-gui
      - feature-*

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          start: npx live-server src --port=5500
          wait-on: 'http://127.0.0.1:5500'