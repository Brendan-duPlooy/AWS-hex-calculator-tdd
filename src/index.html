<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <h1>Hex Calculator</h1>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button>A</button>
        <button>B</button>
        <button>C</button>
        <button>D</button>
        <button>E</button>
        <button>F</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>

        <button>0</button>
        <button>/</button>
        <button>CLEAR</button>
        <button>=</button>
    </div>
</div>

<script src="calculator.js"></script>
<script src="gui.js"></script>
</body>
</html>
